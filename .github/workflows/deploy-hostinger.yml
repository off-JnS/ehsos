name: Build and Deploy to Hostinger
on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build production
        run: npm run build

      # Stage exactly what Hostinger needs:
      #   server.js   — the SPA server / entry point
      #   package.json — so Hostinger knows the start command & Node version
      #   dist/        — the compiled Vite output
      - name: Stage deploy artefacts
        run: |
          mkdir -p deploy
          cp server.js deploy/server.js
          cp package.json deploy/package.json
          cp -r dist deploy/dist

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          protocol: ftp
          port: ${{ secrets.HOSTINGER_FTP_PORT }}
          local-dir: ./deploy/
          server-dir: ${{ secrets.HOSTINGER_SERVER_DIR }}
